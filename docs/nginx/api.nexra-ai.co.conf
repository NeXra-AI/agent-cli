# nginx server block — api.nexra-ai.co
#
# Drop into /opt/homebrew/etc/nginx/servers/api.nexra-ai.co.conf and
# `sudo nginx -t && sudo nginx -s reload`.
#
# Routes the public OAuth + CLI API to the local admin_shop_server (20009).
# All other admin endpoints stay behind shop.jvogue.org/admin/.

server {
  listen 80;
  listen 443 ssl http2;
  server_name api.nexra-ai.co;

  # TLS (Cloudflare termination usually handles this; if origin needs TLS,
  # uncomment and point at your origin cert)
  # ssl_certificate     /etc/letsencrypt/live/api.nexra-ai.co/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.nexra-ai.co/privkey.pem;

  client_max_body_size 100M;   # plugin publish payloads can be large
  proxy_read_timeout 300s;
  proxy_buffering off;

  # Public OAuth (CLI uses these without auth)
  location /v1/oauth/ {
    proxy_pass http://127.0.0.1:20009/api/oauth/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # /me — Bearer auth
  location /v1/me {
    proxy_pass http://127.0.0.1:20009/api/me;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/me/ {
    proxy_pass http://127.0.0.1:20009/api/me/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
  }

  # Studio + Shop — CLI hits via Bearer; admin_api.get_current_admin shim
  # converts nx_at_* tokens → tenant context.
  location /v1/studio/ {
    proxy_pass http://127.0.0.1:20009/api/admin/studio/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/shop/ {
    # Shop is the umbrella; admin_shop_server exposes products/orders/etc at
    # /api/admin/. Map /v1/shop/products → /api/admin/products.
    rewrite ^/v1/shop/(.*)$ /api/admin/$1 break;
    proxy_pass http://127.0.0.1:20009;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
  }

  # Agent chat proxy (LLM gateway)
  location /v1/agent/ {
    proxy_pass http://127.0.0.1:20009/api/admin/agent/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
  }

  # OpenAPI specs (public, no auth)
  location /openapi/ {
    alias /Users/j.voguemacmini/.openclaw/workspace/docs/openapi/;
    add_header Access-Control-Allow-Origin *;
    types {
      application/json json;
      application/yaml yaml;
    }
    autoindex off;
  }

  # Health check
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
