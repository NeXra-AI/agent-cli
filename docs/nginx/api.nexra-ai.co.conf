# nginx server block — api.nexra-ai.co
#
# Drop into /opt/homebrew/etc/nginx/servers/api.nexra-ai.co.conf and
# `sudo nginx -t && sudo nginx -s reload`.
#
# Routes the public OAuth + CLI API to the local admin_shop_server (20009).
# All other admin endpoints stay behind shop.jvogue.org/admin/.

server {
  listen 80;
  server_name api.nexra-ai.co;
  # Note: SSL is terminated at Cloudflare (tunnel → localhost:80). If you want
  # nginx to handle TLS directly some day, add:
  #   listen 443 ssl;
  #   http2 on;
  #   ssl_certificate     /path/to/fullchain.pem;
  #   ssl_certificate_key /path/to/privkey.pem;

  client_max_body_size 100M;   # plugin publish payloads can be large
  proxy_read_timeout 300s;
  proxy_buffering off;

  # === Primary: pass /api/* straight through to admin_shop_server (20009) ====
  # CLI hits /api/oauth/device/*, /api/me, /api/admin/agent/*, /api/admin/studio/*,
  # /api/admin/products, etc — all natively defined on admin_shop_server.
  location /api/ {
    proxy_pass http://127.0.0.1:20009/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  # === Optional: clean /v1/* namespace (for future SDK / API docs marketing) =
  # These rewrite to the admin_shop_server's /api/* path. Aliases for /api/*
  # above; either form works.
  location /v1/oauth/ {
    proxy_pass http://127.0.0.1:20009/api/oauth/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /v1/me {
    proxy_pass http://127.0.0.1:20009/api/me;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/me/ {
    proxy_pass http://127.0.0.1:20009/api/me/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/studio/ {
    proxy_pass http://127.0.0.1:20009/api/admin/studio/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/shop/ {
    rewrite ^/v1/shop/(.*)$ /api/admin/$1 break;
    proxy_pass http://127.0.0.1:20009;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }
  location /v1/agent/ {
    proxy_pass http://127.0.0.1:20009/api/admin/agent/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }

  # === OAuth device approval page lives at nexra-ai.co/admin/oauth/device ====
  # When CLI runs nexra login, it shows the user a URL. That URL hostname
  # comes from services/oauth_device_api.py:VERIFICATION_BASE — currently
  # https://nexra-ai.co/oauth/device. So this server doesn't need to host
  # the approval page; users go to the main nexra-ai.co domain.

  # === OpenAPI specs (public, no auth) ======================================
  location /openapi/ {
    alias /Users/j.voguemacmini/.openclaw/workspace/docs/openapi/;
    add_header Access-Control-Allow-Origin *;
    types {
      application/json json;
      application/yaml yaml;
    }
    autoindex off;
  }

  # === Health check =========================================================
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
